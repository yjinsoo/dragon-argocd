apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: receipt-backend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # CORS 설정을 Ingress 레벨에서도 보강할 수 있습니다
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  rules:
  - host: api.receipt.test.com  # 실제 사용할 도메인 (또는 /etc/hosts에 등록한 이름)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: receipt-backend-svc
            port:
              number: 80
